# =========================
# Proxy Groups（稳定生产版）
# =========================
proxy-groups:

  - name: "低延迟"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 60
    proxies: []

  - name: "AI专线"
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 30
    proxies: []

  - name: "备用节点"
    type: select
    proxies:
      - "低延迟"
      - "AI专线"
      - "DIRECT"

# =========================
# 基础控制
# =========================
external-controller: 127.0.0.1:9090
secret: "CHANGE_ME_STRONG_PASSWORD"

geodata-mode: true
geo-auto-update: true
geo-update-interval: 24

# =========================
# DNS（大陆稳定最终优化）
# =========================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true
  query-timeout: 3

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.market.xiaomi.com"
    - "dns.msftncsi.com"

  # 国内DNS优先（核心）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  nameserver-policy:
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29

  # 国际DNS仅兜底（防污染）
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite: [gfw]
    domain:
      # 核心 AI 服务（API 域名通常是 DNS 污染重灾区）
      - +.openai.com
      - +.chatgpt.com
      - +.claude.ai
      - +.anthropic.com
      # GitHub（GitHub API 经常被干扰，必须强制 fallback）
      - +.github.com
      - +.githubusercontent.com
      # 核心搜索引擎（解决 Google/Bing 搜索时的 IP 归属地问题）
      - +.google.com
      - +.bing.com

# =========================
# Rule Providers（稳定版）
# =========================
rule-providers:

  reject:
    type: http
    behavior: domain
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt
    path: ./ruleset/reject.yaml
    interval: 43200

  proxy:
    type: http
    behavior: domain
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt
    path: ./ruleset/proxy.yaml
    interval: 43200

  direct:
    type: http
    behavior: domain
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
    path: ./ruleset/direct.yaml
    interval: 43200

  gfw:
    type: http
    behavior: domain
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
    path: ./ruleset/gfw.yaml
    interval: 43200

  private:
    type: http
    behavior: domain
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt
    path: ./ruleset/private.yaml
    interval: 43200

  apple:
    type: http
    behavior: domain
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt
    path: ./ruleset/apple.yaml
    interval: 43200

  google:
    type: http
    behavior: domain
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/google.txt
    path: ./ruleset/google.yaml
    interval: 43200

  cncidr:
    type: http
    behavior: ipcidr
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
    path: ./ruleset/cncidr.yaml
    interval: 43200

  lancidr:
    type: http
    behavior: ipcidr
    url: https://ghproxy.net/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
    path: ./ruleset/lancidr.yaml
    interval: 43200

# =========================
# Rules（最终稳定分流逻辑）
# =========================
rules:

  # 1. UDP优化（可选关闭，默认保守）
  # - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

  # 2. 内网优先
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT

  # 3. 国内流量直连（关键）
  - GEOIP,CN,DIRECT
  - GEOIP,LAN,DIRECT

  # 4. 广告拦截
  - GEOSITE,category-ads-all,REJECT
  - RULE-SET,reject,REJECT

  # 5. 国内服务
  - DOMAIN-SUFFIX,steamchina.com,DIRECT
  - DOMAIN-SUFFIX,steamcommunity.com,DIRECT
  - DOMAIN-KEYWORD,steamcontent,DIRECT

  # 6. Apple国内优化
  - RULE-SET,apple,DIRECT

  # 7. AI专线强制走高质量节点
  - DOMAIN-SUFFIX,openai.com,AI专线
  - DOMAIN-SUFFIX,chatgpt.com,AI专线
  - DOMAIN-SUFFIX,claude.ai,AI专线
  - DOMAIN-SUFFIX,anthropic.com,AI专线
  - DOMAIN-SUFFIX,bing.com,AI专线

  # 8. 外网低延迟组
  - RULE-SET,google,低延迟
  - RULE-SET,gfw,低延迟
  - RULE-SET,proxy,低延迟
  - DOMAIN-SUFFIX,githubusercontent.com,低延迟

  # 9. 默认兜底
  - MATCH,低延迟
