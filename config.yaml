# ==============================================================================
# Gist 节点爬虫配置文件 (config.yaml)
# 作用：定义 GitHub Gist 的搜索关键词、安全过滤规则及节点测速行为
# ==============================================================================

# 1. 搜索与过滤逻辑：定义爬虫在 GitHub Gist 搜索时的意图
search_keywords:
  # include (包含策略)：若填入关键词，只有命中这些词的 Gist 才会被扫描。
  # 建议：保持目前的核心协议词，不要放入 clash/sub/mihomo 等过于宽泛的词，避免与黑名单冲突。
  include: 
    - "vless"
    - "hysteria2"
    - "tuic"
    - "anytls"
    - "proxies:- name:"

  # exclude (排除策略)：剔除带有这些词的标题或描述，用于排除广告和过时信息。
  # 注意：不要在此放入协议关键词 (如 vless, clash)，否则会直接过滤掉目标节点。
  exclude:
    - "免费"
    - "机场"
    - "每日更新"
    - "订阅链接"
    - "合集"
    - "archive"
    - "deprecated"
    - "password-protected"

# 2. 身份与安全过滤：防垃圾、防恶意源或重复文件过滤
filters:
  # exclude_owners (作者黑名单)：过滤已知的垃圾源账号。
  exclude_owners: 
    - "yipei-z"
    - "taokun790-lab"
    - "healertiny"
    - "maksimsteam2611-alt"
    - "wtorm321-jpg"
    - "bluesyoung-web"
    - "nina-17"
    - "masomeestid-png"
    - "thatisaproper"
    - "j80547013-max"
    - "1009476063"
    - "irancotton"
    - "DartBS"

  # exclude_files (文件名黑名单)：若文件名包含这些关键词，文件将被跳过。
  # 注意：这里仅包含明确的非核心节点文件，保留了 clash/sub 等关键字以便脚本能正常抓取有效源。
  exclude_files: 
    - "ad-list"
    - "junk"
    - "readme"

# 3. 协议支持：脚本在读取文件内容时，只会提取以这些前缀开头的行
protocols: 
  - "vless://"
  - "hy2://"
  - "hysteria://"
  - "hysteria2://"
  - "tuic://"
  - "anytls://"

# 4. 性能与扫描范围设置
settings:
  max_file_size_mb: 5       # 单个文件体积上限，防止超大文件占用内存
  max_workers: 15           # 并发线程数，决定请求速度
  gist_pages: 88            # 搜索页数，页数越大覆盖的 Gist 越多 (注意 GitHub API 频率限制)
  timeout_seconds: 20       # 请求超时阈值
  small_source_limit: 6     # 小源节点阈值，用于辅助剔除无效源

# 5. 代理组测速设置：该参数直接写入最终生成的 Clash 配置文件
proxy_group_settings:
  # 基础测速地址：通过 204 响应检测连通性，响应快且不消耗用户流量
  url_test_url: "http://cp.cloudflare.com/generate_204"
  # AI 业务专用测速地址：用于验证节点是否支持 ChatGPT 等服务
  ai_optimize_url: "https://chatgpt.com"
  # interval (测速间隔)：单位秒，设备后台每 10 分钟自动对节点进行一次延迟测试
  interval: 600    
  # tolerance (容差)：单位毫秒，若测速差异在 50ms 内，客户端将维持当前节点以防止跳动
  tolerance: 50
